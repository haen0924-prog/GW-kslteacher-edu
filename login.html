<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — KSL Teacher Training</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --blue:#2563eb; --blue-dark:#1d4ed8; --gray-300:#d1d5db; --gray-500:#6b7280; --gray-700:#374151; --gray-900:#111827; --red:#ef4444; --red-light:#fef2f2; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans KR',sans-serif; background:linear-gradient(135deg,#eff6ff 0%,#e0e7ff 100%); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1rem; }
  .top-bar { width:100%; max-width:480px; display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; padding:0 0.25rem; }
  .top-bar-left  { font-size:0.8rem; font-weight:600; color:#1e40af; }
  .top-bar-right { font-size:0.8rem; font-weight:600; color:#1e40af; text-align:right; }
  .card { background:white; border-radius:1.25rem; box-shadow:0 10px 40px rgba(0,0,0,0.1); width:100%; max-width:420px; padding:2.5rem; animation:fadeUp 0.4s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .logo { display:flex; flex-direction:column; align-items:center; margin-bottom:2rem; }
  .logo-icon { width:auto; min-width:56px; padding:0 1rem; height:56px; background:var(--blue); border-radius:1rem; display:flex; align-items:center; justify-content:center; font-size:0.85rem; font-weight:700; color:white; margin-bottom:1rem; white-space:nowrap; }
  .logo h1 { font-size:1.3rem; font-weight:700; color:var(--gray-900); }
  .logo p  { font-size:0.85rem; color:var(--gray-500); margin-top:0.25rem; }
  .tab-wrap { display:flex; background:#f3f4f6; border-radius:0.625rem; padding:0.25rem; margin-bottom:1.5rem; }
  .tab { flex:1; padding:0.5rem; text-align:center; font-size:0.875rem; font-weight:500; color:#6b7280; border-radius:0.375rem; cursor:pointer; transition:all 0.2s; border:none; background:none; font-family:inherit; }
  .tab.active { background:white; color:#111827; font-weight:600; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
  .panel { display:none; }
  .panel.active { display:block; }
  label { display:block; font-size:0.875rem; font-weight:500; color:var(--gray-700); margin-bottom:0.375rem; }
  input { width:100%; padding:0.625rem 0.875rem; border:1.5px solid var(--gray-300); border-radius:0.5rem; font-size:0.95rem; font-family:inherit; outline:none; transition:border-color 0.2s; margin-bottom:1rem; }
  input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
  .btn { width:100%; padding:0.75rem; background:var(--blue); color:white; border:none; border-radius:0.625rem; font-size:1rem; font-weight:600; font-family:inherit; cursor:pointer; transition:background 0.2s; margin-top:0.5rem; }
  .btn:hover { background:var(--blue-dark); }
  .btn:disabled { opacity:0.6; cursor:not-allowed; }
  .error { background:var(--red-light); color:var(--red); font-size:0.85rem; padding:0.625rem 0.875rem; border-radius:0.5rem; margin-bottom:1rem; display:none; }
  .forgot-link { text-align:right; margin-top:0.5rem; }
  .forgot-link a { font-size:0.8rem; color:var(--gray-500); text-decoration:none; }
  .forgot-link a:hover { color:var(--blue); }
</style>
</head>
<body>
<div class="top-bar">
  <span class="top-bar-left">KSL Education Institute</span>
  <span class="top-bar-right">Gangwon KSL Culture Center</span>
</div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">KSL Teacher Training</div>
    <h1>Student Management System</h1>
    <p>Login to check your learning status</p>
  </div>

  <!-- 탭 -->
  <div class="tab-wrap">
    <button class="tab active" onclick="switchTab('student')">Student Login</button>
    <button class="tab" onclick="switchTab('admin')">Admin Login</button>
  </div>

  <!-- Student Login -->
  <div class="panel active" id="panel-student">
    <div class="error" id="studentError"></div>
    <label>Name</label>
    <input type="text" id="s_name" placeholder="Hong Gildong">
    <label>Date of Birth</label>
    <input type="date" id="s_birth">
    <button class="btn" onclick="studentLogin()">Login</button>
  </div>

  <!-- Admin Login -->
  <div class="panel" id="panel-admin">
    <div class="error" id="adminError"></div>
    <label>Email</label>
    <input type="email" id="a_email" placeholder="admin@example.com">
    <label>Password</label>
    <input type="password" id="a_password" placeholder="Password 입력">
    <button class="btn" onclick="adminLogin()">Admin Login</button>
    <p class="forgot-link"><a href="forgot-password.html">Password를 잊으셨나요?</a></p>
  </div>
</div>

<script src="config.js"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 이미 Login된 경우
  const si = sessionStorage.getItem('student_id');
  if (si) location.href = 'dashboard.html';
  sb.auth.getSession().then(({ data }) => {
    if (data.session) location.href = 'dashboard.html';
  });

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    event.target.classList.add('active');
  }

  // Student Login (Name + Date of Birth)
  async function studentLogin() {
    const name  = document.getElementById('s_name').value.trim();
    const birth = document.getElementById('s_birth').value;
    const err   = document.getElementById('studentError');
    err.style.display = 'none';

    if (!name || !birth) {
      err.textContent = 'Name과 Date of Birth을 입력해주세요.';
      err.style.display = 'block'; return;
    }

    const { data, error } = await sb.from('edu_students')
      .select('*')
      .eq('name', name)
      .eq('Date of Birth', birth)
      .single();

    if (error || !data) {
      err.textContent = 'Name 또는 Date of Birth이 일치하지 않습니다.';
      err.style.display = 'block'; return;
    }

    // 세션에 수강생 정보 저장
    sessionStorage.setItem('student_id', data.id);
    sessionStorage.setItem('student_name', data.name);
    sessionStorage.setItem('is_admin', 'false');
    location.href = 'dashboard.html';
  }

  // Admin Login
  async function adminLogin() {
    const email    = document.getElementById('a_email').value.trim();
    const password = document.getElementById('a_password').value;
    const err      = document.getElementById('adminError');
    err.style.display = 'none';

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      err.textContent = 'Email 또는 Password가 올바르지 않습니다.';
      err.style.display = 'block'; return;
    }

    sessionStorage.setItem('is_admin', 'true');
    location.href = 'dashboard.html';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const activePanel = document.querySelector('.panel.active').id;
      if (activePanel === 'panel-student') studentLogin();
      else adminLogin();
    }
  });
</script>
</body>
</html>
