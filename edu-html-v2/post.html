<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게시글 — 수강생 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .back-link { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; color: #6b7280; text-decoration: none; margin-bottom: 1.25rem; transition: color 0.15s; }
  .back-link:hover { color: #111827; }
  .post-title { font-size: 1.5rem; font-weight: 700; color: #111827; margin-bottom: 1rem; }
  .post-meta { display: flex; gap: 1.25rem; font-size: 0.85rem; color: #6b7280; padding-bottom: 1rem; border-bottom: 1px solid #f3f4f6; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .post-meta span { display: flex; align-items: center; gap: 0.3rem; }
  .post-content { font-size: 0.95rem; color: #374151; line-height: 1.85; white-space: pre-wrap; }
  .post-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #f3f4f6; }
</style>
</head>
<body>
<div id="sidebar"></div>
<div id="main">
  <a href="board.html" class="back-link">← 목록으로</a>
  <div class="card" id="postCard">
    <div style="text-align:center;padding:3rem;color:#9ca3af">불러오는 중...</div>
  </div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
  injectStyles();

  const params = new URLSearchParams(location.search);
  const postId = params.get('id');

  (async () => {
    const user = await requireAuth();
    if (!user) return;
    renderSidebar('board.html');

    if (!postId) { location.href = 'board.html'; return; }

    // 조회수 증가
    await sb.rpc('increment_view_count', { post_id: postId }).catch(() => {});

    const { data: post, error } = await sb.from('edu_posts').select('*').eq('id', postId).single();

    const card = document.getElementById('postCard');
    if (error || !post) {
      card.innerHTML = '<div style="text-align:center;padding:3rem;color:#ef4444">게시글을 찾을 수 없습니다.</div>';
      return;
    }

    const isAuthor = user.id === post.user_id;

    card.innerHTML = `
      <h1 class="post-title">${post.title}</h1>
      <div class="post-meta">
        <span>👤 ${post.author_name ?? '익명'}</span>
        <span>🕐 ${new Date(post.created_at).toLocaleString('ko-KR')}</span>
        <span>👁️ ${post.view_count ?? 0}</span>
      </div>
      <div class="post-content">${post.content}</div>
      ${isAuthor ? `
        <div class="post-actions">
          <button class="btn-danger" onclick="deletePost('${post.id}')">🗑️ 삭제</button>
        </div>` : ''}
    `;
  })();

  async function deletePost(id) {
    if (!confirm('게시글을 삭제하시겠습니까?')) return;
    const { error } = await sb.from('edu_posts').delete().eq('id', id);
    if (!error) location.href = 'board.html';
    else alert('삭제에 실패했습니다.');
  }
</script>
</body>
</html>
