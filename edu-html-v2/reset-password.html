<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 재설정 — 수강생 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --blue: #2563eb; --blue-dark: #1d4ed8;
    --gray-300: #d1d5db; --gray-500: #6b7280;
    --gray-700: #374151; --gray-900: #111827;
    --red: #ef4444; --red-light: #fef2f2;
    --green: #16a34a; --green-light: #f0fdf4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #eff6ff 0%, #e0e7ff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { background: white; border-radius: 1.25rem; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 420px; padding: 2.5rem; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .logo { display:flex; flex-direction:column; align-items:center; margin-bottom:2rem; }
  .logo-icon { width:56px; height:56px; background:var(--blue); border-radius:1rem; display:flex; align-items:center; justify-content:center; font-size:1.5rem; margin-bottom:1rem; }
  .logo h1 { font-size:1.4rem; font-weight:700; color:var(--gray-900); }
  .logo p  { font-size:0.85rem; color:var(--gray-500); margin-top:0.25rem; }
  label { display:block; font-size:0.875rem; font-weight:500; color:var(--gray-700); margin-bottom:0.375rem; }
  input[type=password] { width:100%; padding:0.625rem 0.875rem; border:1.5px solid var(--gray-300); border-radius:0.5rem; font-size:0.95rem; font-family:inherit; outline:none; transition:border-color 0.2s; margin-bottom:1rem; }
  input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
  .btn { width:100%; padding:0.75rem; background:var(--blue); color:white; border:none; border-radius:0.625rem; font-size:1rem; font-weight:600; font-family:inherit; cursor:pointer; transition:background 0.2s; margin-top:0.5rem; }
  .btn:hover { background:var(--blue-dark); }
  .btn:disabled { opacity:0.6; cursor:not-allowed; }
  .msg { font-size:0.85rem; padding:0.625rem 0.875rem; border-radius:0.5rem; margin-bottom:1rem; display:none; }
  .error   { background:var(--red-light);   color:var(--red);   }
  .success { background:var(--green-light); color:var(--green); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🔒</div>
    <h1>새 비밀번호 설정</h1>
    <p>새로운 비밀번호를 입력해주세요</p>
  </div>

  <div id="errorMsg"   class="msg error"></div>
  <div id="successMsg" class="msg success"></div>

  <label>새 비밀번호</label>
  <input type="password" id="password" placeholder="6자 이상 입력">

  <label>비밀번호 확인</label>
  <input type="password" id="passwordConfirm" placeholder="비밀번호를 다시 입력">

  <button class="btn" id="resetBtn" onclick="resetPassword()">비밀번호 변경</button>
</div>

<script src="config.js"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function resetPassword() {
    const pw  = document.getElementById('password').value;
    const pw2 = document.getElementById('passwordConfirm').value;
    const btn = document.getElementById('resetBtn');
    const err = document.getElementById('errorMsg');
    const suc = document.getElementById('successMsg');

    err.style.display = 'none';
    suc.style.display = 'none';

    if (pw.length < 6) { err.textContent = '비밀번호는 6자 이상이어야 합니다.'; err.style.display='block'; return; }
    if (pw !== pw2)    { err.textContent = '비밀번호가 일치하지 않습니다.';      err.style.display='block'; return; }

    btn.disabled = true; btn.textContent = '변경 중...';

    const { error } = await sb.auth.updateUser({ password: pw });

    if (error) {
      err.textContent = '변경 실패: ' + error.message;
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = '비밀번호 변경';
      return;
    }

    suc.textContent = '✅ 비밀번호가 변경되었습니다! 로그인 페이지로 이동합니다.';
    suc.style.display = 'block';
    btn.textContent = '완료!';
    setTimeout(() => location.href = 'login.html', 2000);
  }
</script>
</body>
</html>
