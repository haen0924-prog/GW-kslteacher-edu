<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — 한국수어교원 양성과정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .top-wrap { display:flex; gap:2rem; align-items:flex-start; margin-bottom:1.5rem; flex-wrap:wrap; }
  .add-form { background:white; border-radius:0.875rem; border:1px solid #f3f4f6; padding:1.5rem; min-width:320px; flex:1; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-bottom:0.875rem; }
  .form-group { margin-bottom:0.875rem; }
  select.input-field { background:white; }
  table { width:100%; border-collapse:collapse; background:white; border-radius:0.875rem; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
  thead { background:#f9fafb; }
  th { padding:0.75rem 0.875rem; text-align:left; font-size:0.75rem; font-weight:600; color:#6b7280; border-bottom:1px solid #f3f4f6; white-space:nowrap; }
  td { padding:0.75rem 0.875rem; font-size:0.85rem; color:#374151; border-bottom:1px solid #f9fafb; vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#f8fafc; }
  .edit-row td { background:#eff6ff !important; }
  .input-sm { padding:0.35rem 0.5rem; border:1.5px solid #d1d5db; border-radius:0.375rem; font-size:0.8rem; font-family:inherit; outline:none; width:100%; }
  .input-sm:focus { border-color:#2563eb; }
  select.input-sm { background:white; }
  .btn-sm { padding:0.3rem 0.625rem; border:none; border-radius:0.375rem; font-size:0.75rem; font-weight:600; font-family:inherit; cursor:pointer; white-space:nowrap; }
  .btn-save   { background:#2563eb; color:white; }
  .btn-cancel { background:#f3f4f6; color:#374151; }
  .btn-edit   { background:#f0f7ff; color:#2563eb; }
  .btn-del    { background:#fef2f2; color:#ef4444; }
  .search-bar { display:flex; gap:0.75rem; margin-bottom:1rem; flex-wrap:wrap; }
  .search-bar input, .search-bar select { padding:0.5rem 0.875rem; border:1.5px solid #d1d5db; border-radius:0.5rem; font-size:0.875rem; font-family:inherit; outline:none; background:white; }
  .search-bar input { flex:1; min-width:160px; }
</style>
</head>
<body>
<div id="sidebar"></div>
<div id="main">
  <h1 class="page-title">⚙️ 관리자 페이지</h1>
  <p class="page-sub">수강생 데이터를 입력하고 관리하세요</p>

  <div id="accessDenied" style="display:none" class="card">
    <p style="color:#ef4444;text-align:center;padding:2rem">⛔ 관리자만 접근할 수 있습니다.</p>
  </div>

  <div id="adminContent" style="display:none">
    <!-- 수강생 등록 폼 -->
    <div class="add-form" style="margin-bottom:1.5rem">
      <p style="font-size:1rem;font-weight:600;color:#111827;margin-bottom:1rem">수강생 등록</p>
      <div id="formError"   class="error-msg"   style="display:none"></div>
      <div id="formSuccess" class="success-msg" style="display:none"></div>
      <div class="form-row">
        <div><label>이름 *</label><input type="text"  id="f_name"  class="input-field" placeholder="홍길동"></div>
        <div><label>생년월일 *</label><input type="date" id="f_birth" class="input-field"></div>
      </div>
      <div class="form-row">
        <div><label>기수</label>
          <select id="f_gisu" class="input-field">
            <option value="">미설정</option>
            ${Array.from({length:13},(_,i)=>`<option value="${i+1}기">${i+1}기</option>`).join('')}
          </select>
        </div>
        <div><label>수료시간</label><input type="number" id="f_hours" class="input-field" placeholder="예: 120"></div>
      </div>
      <div class="form-row">
        <div><label>수강 시작일</label><input type="date" id="f_start" class="input-field"></div>
        <div><label>수강 종료일</label><input type="date" id="f_end"   class="input-field"></div>
      </div>
      <div class="form-group">
        <label>전화번호</label>
        <input type="text" id="f_phone" class="input-field" placeholder="010-0000-0000">
      </div>
      <button class="btn-primary" style="width:100%;justify-content:center;padding:0.75rem" onclick="addStudent()">등록</button>
    </div>

    <!-- 목록 -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="이름으로 검색..." oninput="filterStudents()">
      <select id="gisuFilter" onchange="filterStudents()">
        <option value="">전체 기수</option>
        <option value="미설정">미설정</option>
        ${Array.from({length:13},(_,i)=>`<option value="${i+1}기">${i+1}기</option>`).join('')}
      </select>
    </div>
    <p style="font-size:0.9rem;font-weight:600;color:#111827;margin-bottom:0.75rem">
      수강생 목록 <span id="countLabel" style="font-weight:400;color:#9ca3af;font-size:0.85rem"></span>
    </p>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>이름</th><th>생년월일</th><th>기수</th>
            <th>수강기간</th><th>수료시간</th><th>전화번호</th><th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
  injectStyles();
  let allStudents = [], editingId = null;

  (async () => {
    const user = await requireAuth();
    if (!user) return;
    renderSidebar('admin.html');
    if (!isAdminUser()) { document.getElementById('accessDenied').style.display='block'; return; }
    document.getElementById('adminContent').style.display = 'block';
    loadStudents();
  })();

  async function loadStudents() {
    const { data } = await sb.from('edu_students').select('*').order('su료_기수').order('name');
    allStudents = data ?? [];
    filterStudents();
  }

  function filterStudents() {
    const kw   = document.getElementById('searchInput').value.trim().toLowerCase();
    const gisu = document.getElementById('gisuFilter').value;
    const list = allStudents.filter(s => {
      const matchName = !kw || s.name?.toLowerCase().includes(kw);
      const sg = s['su료_기수'];
      const matchGisu = !gisu || (gisu==='미설정' && !sg) || sg===gisu;
      return matchName && matchGisu;
    });
    document.getElementById('countLabel').textContent = `(${list.length}명)`;
    renderTable(list);
  }

  const fmt = d => d ? new Date(d).toLocaleDateString('ko-KR') : '-';

  function renderTable(list) {
    const tbody = document.getElementById('tbody');
    if (!list.length) { tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:2rem;color:#9ca3af">수강생이 없습니다.</td></tr>'; return; }

    tbody.innerHTML = list.map(s => {
      const gisu  = s['su료_기수'] ?? '';
      const start = s['수강_시작일'] ? s['수강_시작일'].split('T')[0] : '';
      const end   = s['su료_일']    ? s['su료_일'].split('T')[0]    : '';
      const birth = s['생년월일']    ? s['생년월일'].split('T')[0]    : '';

      if (editingId === s.id) return `
        <tr class="edit-row">
          <td><input class="input-sm" id="e_name_${s.id}"  value="${s.name??''}"></td>
          <td><input class="input-sm" type="date" id="e_birth_${s.id}" value="${birth}"></td>
          <td><select class="input-sm" id="e_gisu_${s.id}">
            <option value="">미설정</option>
            ${Array.from({length:13},(_,i)=>`<option value="${i+1}기" ${gisu===i+1+'기'?'selected':''}>${i+1}기</option>`).join('')}
          </select></td>
          <td style="display:flex;gap:0.25rem">
            <input class="input-sm" type="date" id="e_start_${s.id}" value="${start}" style="width:110px">
            <input class="input-sm" type="date" id="e_end_${s.id}"   value="${end}"   style="width:110px">
          </td>
          <td><input class="input-sm" type="number" id="e_hours_${s.id}" value="${s.수료시간??''}" style="width:70px"></td>
          <td><input class="input-sm" id="e_phone_${s.id}" value="${s.phone??''}"></td>
          <td style="display:flex;gap:0.25rem">
            <button class="btn-sm btn-save"   onclick="saveEdit('${s.id}')">저장</button>
            <button class="btn-sm btn-cancel" onclick="cancelEdit()">취소</button>
          </td>
        </tr>`;

      return `
        <tr>
          <td><strong>${s.name}</strong></td>
          <td>${fmt(s['생년월일'])}</td>
          <td>${gisu ? `<span class="badge badge-blue">${gisu}</span>` : '<span style="color:#9ca3af">미설정</span>'}</td>
          <td style="font-size:0.8rem">${start||'-'} ~ ${end||'-'}</td>
          <td>${s.수료시간 ? s.수료시간+'시간' : '-'}</td>
          <td>${s.phone||'-'}</td>
          <td style="display:flex;gap:0.25rem">
            <button class="btn-sm btn-edit" onclick="startEdit('${s.id}')">수정</button>
            <button class="btn-sm btn-del"  onclick="delStudent('${s.id}')">삭제</button>
          </td>
        </tr>`;
    }).join('');
  }

  function startEdit(id) { editingId=id; filterStudents(); }
  function cancelEdit()  { editingId=null; filterStudents(); }

  async function saveEdit(id) {
    const { error } = await sb.from('edu_students').update({
      name:        document.getElementById('e_name_'+id).value,
      생년월일:    document.getElementById('e_birth_'+id).value || null,
      'su료_기수': document.getElementById('e_gisu_'+id).value || null,
      '수강_시작일':document.getElementById('e_start_'+id).value || null,
      'su료_일':   document.getElementById('e_end_'+id).value || null,
      수료시간:    Number(document.getElementById('e_hours_'+id).value) || null,
      phone:       document.getElementById('e_phone_'+id).value || null,
    }).eq('id', id);
    if (error) { alert('저장 실패: '+error.message); return; }
    editingId = null;
    loadStudents();
  }

  async function delStudent(id) {
    if (!confirm('수강생 정보를 삭제하시겠습니까?')) return;
    await sb.from('edu_students').delete().eq('id', id);
    loadStudents();
  }

  async function addStudent() {
    const name  = document.getElementById('f_name').value.trim();
    const birth = document.getElementById('f_birth').value;
    const err   = document.getElementById('formError');
    const suc   = document.getElementById('formSuccess');
    err.style.display='none'; suc.style.display='none';

    if (!name || !birth) { err.textContent='이름과 생년월일은 필수입니다.'; err.style.display='block'; return; }

    const { error } = await sb.from('edu_students').insert({
      name, 생년월일: birth,
      'su료_기수':  document.getElementById('f_gisu').value  || null,
      '수강_시작일': document.getElementById('f_start').value || null,
      'su료_일':    document.getElementById('f_end').value   || null,
      수료시간:     Number(document.getElementById('f_hours').value) || null,
      phone:        document.getElementById('f_phone').value || null,
    });

    if (error) { err.textContent='등록 실패: '+error.message; err.style.display='block'; return; }
    suc.textContent = '✅ '+name+' 님이 등록되었습니다.';
    suc.style.display = 'block';
    ['f_name','f_birth','f_hours','f_start','f_end','f_phone'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f_gisu').value='';
    loadStudents();
  }
</script>
</body>
</html>
