<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마이페이지 — 한국수어교원 양성과정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .section { max-width:520px; margin-bottom:2rem; }
  .section-title { font-size:1rem; font-weight:600; color:#111827; margin-bottom:1rem; padding-bottom:0.625rem; border-bottom:1px solid #f3f4f6; }
  .form-group { margin-bottom:1rem; }
  .btn-row { display:flex; gap:0.75rem; justify-content:flex-end; margin-top:1.25rem; }
  .info-row { display:flex; justify-content:space-between; padding:0.625rem 0; border-bottom:1px solid #f9fafb; font-size:0.9rem; }
  .info-row:last-child { border-bottom:none; }
  .info-label { color:#6b7280; }
  .info-value { font-weight:500; color:#111827; }
</style>
</head>
<body>
<div id="sidebar"></div>
<div id="main">
  <h1 class="page-title">👤 마이페이지</h1>
  <p class="page-sub">내 정보를 확인하고 이메일을 수정하세요</p>

  
  <div class="section">
    <div class="card">
      <p class="section-title">내 정보</p>
      <div id="infoArea"><div style="color:#9ca3af;font-size:0.875rem">불러오는 중...</div></div>
    </div>
  </div>

  <div class="section">
    <div class="card">
      <p class="section-title">📬 이메일 수정</p>
      <p style="font-size:0.85rem;color:#6b7280;margin-bottom:1rem;line-height:1.6">
        교육 자료 및 안내 정보를 받으실 이메일 주소입니다.<br>
        🔒 수집된 이메일은 「개인정보 보호법」에 따라 보호됩니다.
      </p>
      <div id="emailSuccess" class="success-msg" style="display:none"></div>
      <div id="emailError"   class="error-msg"   style="display:none"></div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="emailInput" class="input-field" placeholder="이메일 주소를 입력하세요">
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="saveEmail()">저장</button>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
  injectStyles();
  const fmt = d => d ? new Date(d).toLocaleDateString('ko-KR') : '-';

  (async () => {
    const user = await requireAuth();
    if (!user) return;
    renderSidebar('mypage.html');

    const studentId = sessionStorage.getItem('student_id') || localStorage.getItem('student_id');

    if (!studentId) {
      document.getElementById('infoArea').innerHTML = '<div style="color:#9ca3af;font-size:0.875rem">수강생만 이용할 수 있습니다.</div>';
      return;
    }

    const { data } = await sb.from('edu_students').select('*, edu_courses(*)').eq('id', studentId).single();

    if (!data) {
      document.getElementById('infoArea').innerHTML = '<div style="color:#9ca3af;font-size:0.875rem">정보를 불러올 수 없습니다.</div>';
      return;
    }

    document.getElementById('emailInput').value = data.email ?? '';
    const courses = data.edu_courses ?? [];
    const totalHours = courses.reduce((sum, c) => sum + (c.수료시간 || 0), 0);
    const firstCourse = courses[0];
    document.getElementById('infoArea').innerHTML = `
      <div class="info-row"><span class="info-label">이름</span><span class="info-value">${data.name || '-'}</span></div>
      <div class="info-row"><span class="info-label">생년월일</span><span class="info-value">${fmt(data.birthdate)}</span></div>
      <div class="info-row"><span class="info-label">기수</span><span class="info-value">${firstCourse ? (firstCourse.기수 || '-') : '-'}</span></div>
      <div class="info-row"><span class="info-label">수강기간</span><span class="info-value">${firstCourse ? fmt(firstCourse.수강_시작일) + ' ~ ' + fmt(firstCourse.수강_종료일) : '- ~ -'}</span></div>
      <div class="info-row"><span class="info-label">수료시간</span><span class="info-value">${totalHours ? totalHours + '시간' : '-'}</span></div>
    `;
  })();

  async function saveEmail() {
    const email = document.getElementById('emailInput').value.trim();
    const suc   = document.getElementById('emailSuccess');
    const err   = document.getElementById('emailError');
    suc.style.display = 'none';
    err.style.display = 'none';

    if (!email || !email.includes('@')) {
      err.textContent = '올바른 이메일 주소를 입력해주세요.';
      err.style.display = 'block';
      return;
    }

    const studentId = sessionStorage.getItem('student_id') || localStorage.getItem('student_id');

    if (!studentId) {
      err.textContent = '수강생만 이용할 수 있습니다.';
      err.style.display = 'block';
      return;
    }

    const { error } = await sb.from('edu_students').update({ email }).eq('id', studentId);

    if (error) {
      err.textContent = '저장 실패: ' + error.message;
      err.style.display = 'block';
      return;
    }

    suc.textContent = '✅ 이메일이 저장되었습니다.';
    suc.style.display = 'block';
  }
</script>
</body>
</html>
