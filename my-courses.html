<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이수현황 — 한국수어교원 양성과정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:0.75rem; margin-top:1rem; }
  .info-item { background:#f9fafb; border-radius:0.5rem; padding:0.875rem 1rem; }
  .info-label { font-size:0.75rem; color:#9ca3af; margin-bottom:0.25rem; }
  .info-value { font-size:0.95rem; font-weight:600; color:#111827; }
  .cert-box { background:linear-gradient(135deg,#1e40af,#2563eb); color:white; border-radius:1rem; padding:2rem; text-align:center; margin-top:1.5rem; }
  .cert-title { font-size:1.1rem; font-weight:700; margin-bottom:0.5rem; }
  .cert-hours { font-size:2.5rem; font-weight:700; }
  .cert-sub   { font-size:0.85rem; opacity:0.8; margin-top:0.25rem; }
</style>
</head>
<body>
<div id="sidebar"></div>
<div id="main">
  <h1 class="page-title">📚 이수현황</h1>
  <p class="page-sub">내 수강 과정 및 이수 현황을 확인하세요</p>
  <div id="content"><div style="text-align:center;padding:3rem;color:#9ca3af">불러오는 중...</div></div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
  injectStyles();
  const fmt = d => d ? new Date(d).toLocaleDateString('ko-KR') : '-';

  (async () => {
    const user = await requireAuth();
    if (!user) return;
    renderSidebar('my-courses.html');

    const { data } = await sb.from('edu_students')
      .select('*').eq('id', user.id).single();

    const el = document.getElementById('content');
    if (!data) {
      el.innerHTML = '<div class="card" style="text-align:center;padding:3rem;color:#9ca3af">📚 등록된 수강 정보가 없습니다.<br><small>관리자에게 문의하세요.</small></div>';
      return;
    }

    const gisu  = data['su료_기수'];
    const end   = data['su료_일'];
    const start = data['수강_시작일'];
    const isComplete = end && new Date(end) < new Date();

    el.innerHTML = `
      <div class="card">
        <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem">
          <span style="font-size:1.2rem;font-weight:700;color:#111827">${gisu ? gisu+' 수강생' : '수강생'}</span>
          <span class="badge ${isComplete?'badge-green':'badge-blue'}">${isComplete?'수료':'수강중'}</span>
        </div>
        <div class="info-grid">
          <div class="info-item"><div class="info-label">이름</div><div class="info-value">👤 ${data.name}</div></div>
          <div class="info-item"><div class="info-label">기수</div><div class="info-value">🏷️ ${gisu||'미설정'}</div></div>
          <div class="info-item"><div class="info-label">수강 시작일</div><div class="info-value">📅 ${fmt(start)}</div></div>
          <div class="info-item"><div class="info-label">수강 종료일</div><div class="info-value">📅 ${fmt(end)}</div></div>
        </div>
        ${data.수료시간 ? `
        <div class="cert-box">
          <div class="cert-title">🎓 수료 이수시간</div>
          <div class="cert-hours">${data.수료시간}시간</div>
          <div class="cert-sub">한국수어교원 양성과정 이수 완료</div>
        </div>` : ''}
      </div>`;
  })();
</script>
</body>
</html>
