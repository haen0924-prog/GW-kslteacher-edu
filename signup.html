<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 — 한국수어교원 양성과정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --blue: #2563eb; --blue-dark: #1d4ed8;
    --gray-300: #d1d5db; --gray-500: #6b7280;
    --gray-700: #374151; --gray-900: #111827;
    --red: #ef4444; --red-light: #fef2f2;
    --green: #16a34a; --green-light: #f0fdf4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #eff6ff 0%, #e0e7ff 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
  .top-bar { width: 100%; max-width: 480px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding: 0 0.25rem; }
  .top-bar-left  { font-size: 0.8rem; font-weight: 600; color: #1e40af; }
  .top-bar-right { font-size: 0.8rem; font-weight: 600; color: #1e40af; text-align: right; }
  .card { background: white; border-radius: 1.25rem; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 420px; padding: 2.5rem; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .logo { display:flex; flex-direction:column; align-items:center; margin-bottom:2rem; }
  .logo-icon { width:auto; min-width:56px; padding:0 1rem; height:56px; background:var(--blue); border-radius:1rem; display:flex; align-items:center; justify-content:center; font-size:0.85rem; font-weight:700; color:white; margin-bottom:1rem; white-space:nowrap; }
  .logo h1 { font-size:1.3rem; font-weight:700; color:var(--gray-900); }
  .logo p  { font-size:0.85rem; color:var(--gray-500); margin-top:0.25rem; }
  label { display:block; font-size:0.875rem; font-weight:500; color:var(--gray-700); margin-bottom:0.375rem; }
  input[type=text], input[type=email], input[type=password], select {
    width:100%; padding:0.625rem 0.875rem; border:1.5px solid var(--gray-300);
    border-radius:0.5rem; font-size:0.95rem; font-family:inherit; outline:none;
    transition:border-color 0.2s; margin-bottom:1rem; background:white;
  }
  input:focus, select:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
  .btn { width:100%; padding:0.75rem; background:var(--blue); color:white; border:none; border-radius:0.625rem; font-size:1rem; font-weight:600; font-family:inherit; cursor:pointer; transition:background 0.2s; margin-top:0.5rem; }
  .btn:hover { background:var(--blue-dark); }
  .btn:disabled { opacity:0.6; cursor:not-allowed; }
  .msg { font-size:0.85rem; padding:0.625rem 0.875rem; border-radius:0.5rem; margin-bottom:1rem; display:none; }
  .error   { background:var(--red-light);   color:var(--red);   }
  .success { background:var(--green-light); color:var(--green); }
  .footer-link { text-align:center; font-size:0.875rem; color:var(--gray-500); margin-top:1.5rem; }
  .footer-link a { color:var(--blue); font-weight:500; text-decoration:none; }
  .footer-link a:hover { text-decoration:underline; }
</style>
</head>
<body>

<div class="top-bar">
  <span class="top-bar-left">한국수어교육원</span>
  <span class="top-bar-right">강원특별자치도수어문화원</span>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">한국수어교원 양성과정</div>
    <h1>회원가입</h1>
    <p>수강생 관리 시스템에 가입하세요</p>
  </div>

  <div id="errorMsg"   class="msg error"></div>
  <div id="successMsg" class="msg success"></div>

  <label>이름 *</label>
  <input type="text" id="fullname" placeholder="홍길동">

  <label>기수</label>
  <select id="gisu">
    <option value="">모름</option>
    <option value="1기">1기</option>
    <option value="2기">2기</option>
    <option value="3기">3기</option>
    <option value="4기">4기</option>
    <option value="5기">5기</option>
    <option value="6기">6기</option>
    <option value="7기">7기</option>
    <option value="8기">8기</option>
    <option value="9기">9기</option>
    <option value="10기">10기</option>
    <option value="11기">11기</option>
    <option value="12기">12기</option>
    <option value="13기">13기</option>
  </select>

  <label>이메일 *</label>
  <input type="email" id="email" placeholder="example@email.com">

  <label>비밀번호 *</label>
  <input type="password" id="password" placeholder="6자 이상 입력">

  <label>비밀번호 확인 *</label>
  <input type="password" id="passwordConfirm" placeholder="비밀번호를 다시 입력">

  <button class="btn" id="signupBtn" onclick="signup()">회원가입</button>

  <p class="footer-link">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
</div>

<script src="config.js"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function signup() {
    const fullname = document.getElementById('fullname').value.trim();
    const gisu     = document.getElementById('gisu').value;
    const email    = document.getElementById('email').value.trim();
    const pw       = document.getElementById('password').value;
    const pw2      = document.getElementById('passwordConfirm').value;
    const btn      = document.getElementById('signupBtn');
    const err      = document.getElementById('errorMsg');
    const suc      = document.getElementById('successMsg');

    err.style.display = 'none'; suc.style.display = 'none';

    if (!fullname)     { err.textContent = '이름을 입력해주세요.';               err.style.display='block'; return; }
    if (pw !== pw2)    { err.textContent = '비밀번호가 일치하지 않습니다.';      err.style.display='block'; return; }
    if (pw.length < 6) { err.textContent = '비밀번호는 6자 이상이어야 합니다.';  err.style.display='block'; return; }

    btn.disabled = true; btn.textContent = '가입 중...';

    const { data, error } = await sb.auth.signUp({
      email, password: pw,
      options: { data: { full_name: fullname } }
    });

    if (error) {
      err.textContent = '회원가입 실패: ' + error.message;
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = '회원가입';
      return;
    }

    const userId = data.user?.id;
    if (userId) {
      const { error: insertError } = await sb.from('edu_students').insert({
        user_id: userId,
        name: fullname,
        '수료_기수': gisu || null,
      });
      if (insertError) {
        err.textContent = '수강생 등록 오류: ' + insertError.message;
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = '회원가입';
        return;
      }
    }

    if (data.session) {
      location.href = 'dashboard.html';
      return;
    }

    suc.textContent = '📧 ' + email + ' 으로 인증 메일을 보냈습니다. 메일함을 확인해주세요!';
    suc.style.display = 'block';
    btn.textContent = '완료!';
    setTimeout(() => location.href = 'login.html', 3000);
  }
</script>
</body>
</html>
